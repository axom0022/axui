loaders:
  - name: spinner loader
    creator: axom
    css: |
      .loader {
        width: 40px;
        height: 40px;
        border: 4px solid #333;
        border-left-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    html: |
      <div class="loader"></div>

tooltips:
  - name: hover tooltip
    creator: axom
    css: |
      .tooltip {
        position: relative;
        padding: 12px 18px;
        background: #6c5ce7;
        color: #fff;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
      }
      .tooltip-text {
        position: absolute;
        bottom: 130%;
        left: 50%;
        transform: translateX(-50%);
        background: #1e1e1e;
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
        opacity: 0;
        visibility: hidden;
        transition: 0.2s;
      }
      .tooltip:hover .tooltip-text {
        opacity: 1;
        visibility: visible;
        bottom: 140%;
      }
    html: |
      <div class="tooltip">
        Hover me
        <div class="tooltip-text">Hello Tooltip ✨</div>
      </div>

buttons:
  - name: arrow button
    creator: axom
    css: |
      .arrow-btn {
        --primary-color: #645bff;
        --hover-color: #111;
        color: white;
        background: var(--primary-color);
        border: 0;
        padding: 12px 20px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .arrow {
        width: 10px;
        height: 2px;
        background: white;
        position: relative;
      }
      .arrow::before {
        content: "";
        position: absolute;
        right: 0;
        border: solid white;
        border-width: 0 2px 2px 0;
        padding: 3px;
        transform: rotate(-45deg);
      }
    html: |
      <button class="arrow-btn">
        Sign up
        <div class="arrow"></div>
      </button>

checkboxes:
  - name: circle checkbox
    creator: axom
    css: |
      .container-check {
        position: relative;
      }
      .container-check input {
        position: absolute;
        opacity: 0;
      }
      .checkmark {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #444;
        display: inline-block;
      }
      .container-check input:checked + .checkmark {
        background: linear-gradient(144deg,#af40ff,#5b42f3,#00ddeb);
      }
    html: |
      <label class="container-check">
        <input type="checkbox">
        <span class="checkmark"></span>
      </label>

toggles:
  - name: vertical toggle
    creator: axom
    css: |
      .toggle-box {
        display: flex;
        gap: 10px;
        color: white;
        font-size: 40px;
      }
      .toggle {
        width: 60px;
        height: 120px;
        background: #888;
        border-radius: 20px;
        position: relative;
        cursor: pointer;
      }
      .circle {
        width: 40px;
        height: 40px;
        background: white;
        border-radius: 50%;
        position: absolute;
        bottom: 10px;
        left: 10px;
        transition: 0.3s;
      }
      #check:checked + .toggle .circle {
        bottom: 70px;
        background: #41a63c;
      }
    html: |
      <div class="toggle-box">
        N
        <input type="checkbox" id="check" hidden>
        <label for="check" class="toggle">
          <div class="circle"></div>
        </label>
        FF
      </div>

cards:
  - name: menu card
    creator: axom
    css: |
      .card {
        width: 220px;
        background: #242832;
        border-radius: 10px;
        padding: 10px;
        color: #aaa;
      }
      .card .item {
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
      }
      .card .item:hover {
        background: #5353ff;
        color: white;
      }
    html: |
      <div class="card">
        <div class="item">Rename</div>
        <div class="item">Settings</div>
        <div class="item">Delete</div>
      </div>

inputs:
  - name: input with button
    creator: axom
    css: |
      .input-box {
        display: flex;
        gap: 10px;
        background: #eee;
        padding: 10px;
        border: 3px solid #000;
      }
      .input-box input {
        border: none;
        outline: none;
        background: transparent;
      }
    html: |
      <div class="input-box">
        <input placeholder="Enter username">
        <button>Go</button>
      </div>
