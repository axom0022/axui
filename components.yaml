loaders:
  - name: spinner
    creator: axom
    html: |
      <div class="flex justify-center items-center p-8">
        <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
      </div>

  - name: pulse dots
    creator: axom
    html: |
      <div class="flex gap-3 justify-center items-center p-8">
        <div class="w-3 h-3 bg-gray-500 rounded-full animate-pulse"></div>
        <div class="w-3 h-3 bg-gray-500 rounded-full animate-pulse" style="animation-delay: 0.2s"></div>
        <div class="w-3 h-3 bg-gray-500 rounded-full animate-pulse" style="animation-delay: 0.4s"></div>
      </div>

cards:
  - name: profile card
    creator: jane
    html: |
      <div class="bg-white rounded-xl shadow-lg p-6 max-w-sm mx-auto">
        <div class="w-24 h-24 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-bold">
          JD
        </div>
        <h3 class="text-xl font-bold text-center mt-4">John Doe</h3>
        <p class="text-gray-500 text-center">Product Designer</p>
        <div class="flex gap-2 mt-4 justify-center">
          <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">Follow</button>
          <button class="border border-gray-300 px-4 py-2 rounded-lg text-sm">Message</button>
        </div>
      </div>

  - name: product card
    creator: axom
    html: |
      <div class="bg-white rounded-2xl shadow-md overflow-hidden max-w-sm">
        <div class="h-48 bg-gradient-to-r from-blue-400 to-purple-500"></div>
        <div class="p-5">
          <h3 class="font-bold text-xl">Premium Product</h3>
          <p class="text-gray-500 mt-1">$49.99</p>
          <button class="mt-4 w-full bg-gray-900 text-white py-2 rounded-lg hover:bg-gray-800 transition">
            Add to cart
          </button>
        </div>
      </div>

buttons:
  - name: gradient button
    creator: axom
    html: |
      <button class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-3 rounded-full font-semibold shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-105">
        click me
      </button>

  - name: outline button
    creator: axom
    html: |
      <button class="border-2 border-blue-600 text-blue-600 px-8 py-3 rounded-lg font-semibold hover:bg-blue-600 hover:text-white transition-all duration-300">
        outline button
      </button>

pages:
  - name: login page
    creator: axom
    html: |
      <div class="min-h-[400px] bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center p-6 rounded-xl">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-96">
          <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">welcome back</h2>
          <input type="email" placeholder="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input type="password" placeholder="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
            sign in
          </button>
        </div>
      </div>

  - name: dashboard page
    creator: axom
    html: |
      <div class="bg-gray-100 rounded-xl p-6 min-h-[400px]">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
          <div class="w-10 h-10 bg-gray-300 rounded-full"></div>
        </div>
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-white p-4 rounded-lg shadow">
            <p class="text-gray-500 text-sm">Total Users</p>
            <p class="text-2xl font-bold">12,345</p>
          </div>
          <div class="bg-white p-4 rounded-lg shadow">
            <p class="text-gray-500 text-sm">Revenue</p>
            <p class="text-2xl font-bold">$49,283</p>
          </div>
          <div class="bg-white p-4 rounded-lg shadow">
            <p class="text-gray-500 text-sm">Growth</p>
            <p class="text-2xl font-bold text-green-600">+23%</p>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
          <p class="text-gray-600">Recent activity will appear here</p>
        </div>
      </div>

checkboxes:
  - name: default checkbox
    creator: axom
    html: |
      <label class="flex items-center gap-3 p-4">
        <input type="checkbox" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
        <span class="text-gray-700">Accept terms and conditions</span>
      </label>

  - name: card checkbox
    creator: axom
    html: |
      <label class="flex items-center gap-4 p-4 border rounded-lg cursor-pointer hover:bg-gray-50 transition">
        <input type="checkbox" class="w-5 h-5 text-blue-600 rounded">
        <div>
          <p class="font-medium">Premium Plan</p>
          <p class="text-sm text-gray-500">$29.99 per month</p>
        </div>
      </label>

toggles:
  - name: ios toggle
    creator: axom
    html: |
      <label class="relative inline-flex items-center cursor-pointer p-4">
        <input type="checkbox" class="sr-only peer">
        <div class="w-11 h-6 bg-gray-200 peer-checked:bg-blue-600 rounded-full peer transition-all duration-300 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
        <span class="ml-3 text-gray-700">Enable notifications</span>
      </label>

  - name: material toggle
    creator: axom
    html: |
      <label class="relative inline-flex items-center cursor-pointer p-4">
        <input type="checkbox" class="sr-only peer">
        <div class="w-12 h-6 bg-gray-300 peer-checked:bg-blue-500 rounded-full peer shadow-inner after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:rounded-full after:h-4 after:w-4 after:shadow-md after:transition-all peer-checked:after:translate-x-6"></div>
        <span class="ml-3 text-gray-700">Dark mode</span>
      </label>

inputs:
  - name: modern input
    creator: axom
    html: |
      <div class="p-4">
        <input type="text" placeholder="Enter your name" class="w-64 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>

  - name: floating label input
    creator: axom
    html: |
      <div class="relative p-4">
        <input type="email" id="email" class="w-64 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 peer" placeholder=" ">
        <label for="email" class="absolute left-5 top-2 text-gray-500 text-sm transition-all peer-placeholder-shown:top-2 peer-placeholder-shown:text-base peer-focus:top-[-10px] peer-focus:text-xs peer-focus:bg-white peer-focus:px-1">Email address</label>
      </div>

forms:
  - name: contact form
    creator: axom
    html: |
      <div class="bg-white rounded-xl shadow-lg p-6 w-96">
        <h3 class="text-xl font-bold mb-4">Contact Us</h3>
        <input type="text" placeholder="Name" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3">
        <input type="email" placeholder="Email" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3">
        <textarea placeholder="Message" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4"></textarea>
        <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Send Message</button>
      </div>

  - name: signup form
    creator: axom
    html: |
      <div class="bg-white rounded-xl shadow-lg p-6 w-96">
        <h3 class="text-xl font-bold mb-4">Create Account</h3>
        <input type="text" placeholder="Username" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3">
        <input type="email" placeholder="Email" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3">
        <input type="password" placeholder="Password" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4">
        <button class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Sign Up</button>
      </div>

patterns:
  - name: modal pattern
    creator: axom
    html: |
      <div class="p-4">
        <button onclick="this.nextElementSibling.classList.remove('hidden')" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Open Modal</button>
        <div class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center" onclick="if(event.target===this)this.classList.add('hidden')">
          <div class="bg-white rounded-xl p-6 w-96">
            <h3 class="text-xl font-bold mb-2">Modal Title</h3>
            <p class="text-gray-600 mb-4">This is a modal dialog. Click outside or the close button to dismiss.</p>
            <button onclick="this.closest('.fixed').classList.add('hidden')" class="bg-gray-600 text-white px-4 py-2 rounded-lg">Close</button>
          </div>
        </div>
      </div>

  - name: dropdown pattern
    creator: axom
    html: |
      <div class="relative inline-block p-4" x-data="{ open: false }">
        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="bg-gray-800 text-white px-4 py-2 rounded-lg">Menu</button>
        <div class="hidden absolute mt-2 bg-white border rounded-lg shadow-lg w-48">
          <a href="#" class="block px-4 py-2 hover:bg-gray-100">Profile</a>
          <a href="#" class="block px-4 py-2 hover:bg-gray-100">Settings</a>
          <a href="#" class="block px-4 py-2 hover:bg-gray-100">Logout</a>
        </div>
      </div>

tooltips:
  - name: top tooltip
    creator: axom
    html: |
      <div class="relative inline-block group p-8">
        <button class="bg-gray-800 text-white px-4 py-2 rounded-lg">Hover me</button>
        <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 hidden group-hover:block bg-gray-900 text-white text-sm px-2 py-1 rounded whitespace-nowrap">Tooltip text</div>
      </div>

  - name: right tooltip
    creator: axom
    html: |
      <div class="relative inline-block group p-8">
        <button class="bg-gray-800 text-white px-4 py-2 rounded-lg">Hover me</button>
        <div class="absolute left-full top-1/2 transform -translate-y-1/2 ml-2 hidden group-hover:block bg-gray-900 text-white text-sm px-2 py-1 rounded whitespace-nowrap">Tooltip on right</div>
      </div>

others:
  - name: badge
    creator: axom
    html: |
      <div class="flex gap-2 p-4">
        <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm">New</span>
        <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm">Success</span>
        <span class="bg-red-100 text-red-800 px-3 py-1 rounded-full text-sm">Error</span>
      </div>

  - name: alert
    creator: axom
    html: |
      <div class="bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 rounded">
        <p class="font-bold">Info</p>
        <p>This is an informational alert message.</p>
      </div>
