<div class="bg-white rounded-xl shadow-lg p-6 w-96">
  <h3 class="text-xl font-bold mb-4">Contact Us</h3>
  <input type="text" placeholder="Name" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3">
  <input type="email" placeholder="Email" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3">
  <textarea placeholder="Message" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4"></textarea>
  <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Send Message</button>
</div>
