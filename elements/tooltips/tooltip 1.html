<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body {
  height: 100vh;
  margin: 0;
  display: grid;
  place-items: center;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
}

.tooltip {
  position: relative;
  display: inline-block;
  padding: 12px 18px;
  background: #6c5ce7;
  color: white;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s ease;
}

.tooltip:hover {
  transform: scale(1.05);
  background: #5a4bd6;
}

.tooltip-text {
  position: absolute;
  bottom: 130%;
  left: 50%;
  transform: translateX(-50%);
  background: #1e1e1e;
  color: #fff;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: 0.2s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.tooltip-text::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border-width: 6px;
  border-style: solid;
  border-color: #1e1e1e transparent transparent transparent;
}

.tooltip:hover .tooltip-text {
  opacity: 1;
  visibility: visible;
  bottom: 140%;
}
</style>
</head>
<body>

<div class="tooltip">
  Hover me
  <div class="tooltip-text">This is a tooltip</div>
</div>

</body>
</html>
