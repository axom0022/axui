<style>
  .tooltip {
    position: relative;
    display: inline-block;
    padding: 12px 18px;
    background: #6c5ce7;
    color: white;
    border-radius: 10px;
    cursor: pointer;
  }
  .tooltip-text {
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    background: #1e1e1e;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: 0.2s;
  }
  .tooltip:hover .tooltip-text {
    opacity: 1;
    visibility: visible;
    bottom: 140%;
  }
</style>
<div class="tooltip">
  Hover me
  <div class="tooltip-text">Hello Tooltip</div>
</div>
