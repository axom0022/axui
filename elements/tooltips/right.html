<style>
  .tooltip-right {
    position: relative;
    display: inline-block;
    padding: 12px 18px;
    background: #6c5ce7;
    color: white;
    border-radius: 10px;
    cursor: pointer;
  }
  .tooltip-right-text {
    position: absolute;
    left: 110%;
    top: 50%;
    transform: translateY(-50%);
    background: #1e1e1e;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: 0.2s;
  }
  .tooltip-right:hover .tooltip-right-text {
    opacity: 1;
    visibility: visible;
    left: 120%;
  }
</style>
<div class="tooltip-right">
  Hover me
  <div class="tooltip-right-text">Tooltip on right</div>
</div>
